name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -v

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            archive: echobot-windows-amd64.zip
          - os: ubuntu-22.04
            archive: echobot-linux-amd64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller echobot.spec --noconfirm

      - name: Include .env template
        shell: bash
        run: cp .env.example dist/echobot/.env

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/echobot -DestinationPath "${{ matrix.archive }}"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.archive }}" -C dist echobot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          git archive --format=tar.gz --prefix="echobot-${VERSION}/" -o "echobot-${VERSION}.tar.gz" HEAD
          git archive --format=zip   --prefix="echobot-${VERSION}/" -o "echobot-${VERSION}.zip"   HEAD

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            echobot-*.tar.gz
            echobot-*.zip
            artifacts/*
