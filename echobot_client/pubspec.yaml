name: echobot_client
description: "EchoBot Flutter Android 客户端"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 网络
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # 摄像头
  camera: ^0.11.0+2

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 本地存储
  shared_preferences: ^2.3.3

  # Markdown 渲染
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

